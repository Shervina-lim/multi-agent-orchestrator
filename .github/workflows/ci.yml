name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch: {}

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Cache Go build & modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ${{ env.GOMODCACHE }}
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Run unit tests
        run: go test ./... -v

  build:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Cache Go build & modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ${{ env.GOMODCACHE }}
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Build manager binary
        run: |
          mkdir -p bin
          go build -o bin/manager ./cmd/manager

      - name: Build worker sample binary
        run: |
          mkdir -p bin
          go build -o bin/worker-sample ./workers/sample

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin

  integration:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install dependencies
        run: go mod download

      - name: Start services with docker-compose
        run: |
          docker compose -f infra/docker-compose.ci.yml up --build -d

      - name: Wait for services
        run: |
          echo "Waiting 10s for services to start"
          sleep 10

      - name: Run integration tests
        run: go test ./tests -v

      - name: Tear down services
        if: always()
        run: docker compose -f infra/docker-compose.ci.yml down --volumes
