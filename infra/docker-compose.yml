services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  # manager and worker are meant for local dev; they run with `go run` or you can build images
  manager:
    build:
      context: ..
      dockerfile: Dockerfile
    command: go run ./cmd/manager
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    ports:
      - "8080:8080"
    depends_on:
      - rabbitmq

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    command: go run ./workers/sample
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      - rabbitmq
